task_type: "classification"

experiment:
  name: "gemma-doc-label-ben25"
  description: "GemmaDocLabelModel (GPU) on ben25 document classification"

model:
  type: "gemma-doc-label"
  variant: "gemma4:e2b"
  device: "cpu"
  batch_sizes: [1]

dataset:
  type: "ben25"
  data_root: ""

metrics:
  - classification_accuracy
  - throughput_chars_per_sec
  - latency_p50_p95_p99

output:
  formats: [terminal, markdown, json]
  path: "./results/"
